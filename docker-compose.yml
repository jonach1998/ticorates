services:
  ticorates:
    image: jonach1998/ticorates:latest
    container_name: ticorates
    hostname: ticorates
    
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - TZ=America/Costa_Rica
    volumes:
      - ticorates_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ticorates_data:
